<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mega Q-Studio - Pro Edition</title>
    <style>
        :root { 
            --q-blue: #00adef; --q-dark: #121212; --q-panel: #2a2a2a; 
            --q-green: #8cc63f; --q-red: #ff4757; --q-purple: #bf5af2;
            --q-orange: #ff9f0a; --q-pink: #ff7eb9; --q-yellow: #f1c40f;
        }
        body { background: var(--q-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: #000; padding: 15px; display: flex; align-items: center; gap: 20px; border-bottom: 3px solid var(--q-blue); }
        .play-btn { background: var(--q-green); border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; color: black; transition: 0.2s; }
        .play-btn:active { transform: scale(0.95); }

        .main { display: flex; flex-grow: 1; overflow: hidden; }
        
        #toolbox { width: 220px; background: var(--q-panel); padding: 20px; border-right: 2px solid #000; overflow-y: auto; }
        .inst-item { background: #444; padding: 12px; margin-bottom: 10px; border-radius: 10px; text-align: center; cursor: grab; font-weight: bold; border: 2px solid transparent; transition: 0.2s; user-select: none; }
        .inst-item:hover { border-color: white; background: #555; }

        #composer { flex-grow: 1; padding: 20px; overflow-y: auto; background: #1a1a1a; }
        .track-box { background: #222; margin-bottom: 25px; border-radius: 12px; padding: 15px; border: 1px solid #333; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .track-title { font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .note-row { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
        .note-name { width: 40px; font-size: 11px; font-weight: bold; color: #777; text-align: right; }
        
        .cell { width: 32px; height: 28px; background: #333; border-radius: 3px; cursor: pointer; transition: 0.1s; }
        .cell:hover { background: #444; }
        .cell.active { box-shadow: 0 0 10px currentColor; }
        .cell.playing { border: 2px solid white; filter: brightness(1.6); transform: scale(1.1); z-index: 2; }
        
        .remove-x { background: var(--q-red); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 10px; }

        /* Track Theming */
        .piano-track { color: var(--q-blue); } .piano-track .active { background: var(--q-blue); }
        .guitar-track { color: var(--q-red); } .guitar-track .active { background: var(--q-red); }
        .synth-track { color: var(--q-purple); } .synth-track .active { background: var(--q-purple); }
        .pluck-track { color: var(--q-pink); } .pluck-track .active { background: var(--q-pink); }
        .violin-track { color: var(--q-yellow); } .violin-track .active { background: var(--q-yellow); }
        .drums-track { color: var(--q-green); } .drums-track .active { background: var(--q-green); }
    </style>
</head>
<body>

    <div class="header">
        <div style="color:var(--q-blue); font-weight:900; font-size: 20px;">MEGA Q-STUDIO</div>
        <button class="play-btn" onclick="togglePlayback()">▶ PLAY / STOP</button>
        <span style="font-size: 12px; margin-left: 20px;">SPEED: <input type="range" id="tempo" min="60" max="300" value="160" dir="rtl"></span>
    </div>

    <div class="main">
        <div id="toolbox">
            <p style="color:var(--q-orange); font-size:11px; letter-spacing: 1px;">MELODIC</p>
            <div class="inst-item" style="color:var(--q-blue)" draggable="true" ondragstart="onDrag(event, 'piano')">🎹 PIANO</div>
            <div class="inst-item" style="color:var(--q-red)" draggable="true" ondragstart="onDrag(event, 'guitar')">🎸 GUITAR</div>
            <div class="inst-item" style="color:var(--q-purple)" draggable="true" ondragstart="onDrag(event, 'synth')">🛸 SPACE SYNTH</div>
            <div class="inst-item" style="color:var(--q-pink)" draggable="true" ondragstart="onDrag(event, 'pluck')">💎 CRYSTAL PLUCK</div>
            <div class="inst-item" style="color:var(--q-yellow)" draggable="true" ondragstart="onDrag(event, 'violin')">🎻 VIOLIN STRINGS</div>
            
            <p style="color:var(--q-orange); font-size:11px; margin-top:20px; letter-spacing: 1px;">RHYTHM</p>
            <div class="inst-item" style="color:var(--q-green)" draggable="true" ondragstart="onDrag(event, 'drums')">🥁 DRUM KIT</div>
        </div>
        <div id="composer" ondragover="event.preventDefault()" ondrop="onDrop(event)">
            <div id="workspace-rows"></div>
        </div>
    </div>

<script>
    let audioCtx;
    let playing = false;
    let step = 0;
    let interval;

    const scale = [
        { key: 'B', f: 493.88 }, { key: 'A', f: 440.00 }, { key: 'G', f: 392.00 },
        { key: 'F', f: 349.23 }, { key: 'E', f: 329.63 }, { key: 'D', f: 293.66 }, { key: 'C', f: 261.63 }
    ];

    function onDrag(e, type) { e.dataTransfer.setData("type", type); }
    
    function onDrop(e) {
        e.preventDefault();
        createTrack(e.dataTransfer.getData("type"));
    }

    function createTrack(type) {
        const id = "t" + Date.now();
        const box = document.createElement('div');
        box.className = `track-box ${type}-track`;
        box.id = id;

        let rowsHTML = '';
        if (type === 'drums') {
            const sounds = [{n:'HI-HAT', s:'hat'}, {n:'SNARE', s:'snare'}, {n:'KICK', s:'kick'}];
            sounds.forEach(d => {
                rowsHTML += `<div class="note-row"><div class="note-name">${d.n}</div>`;
                for(let i=0; i<16; i++) rowsHTML += `<div class="cell" data-sound="${d.s}" onclick="this.classList.toggle('active')"></div>`;
                rowsHTML += `</div>`;
            });
        } else {
            scale.forEach(n => {
                rowsHTML += `<div class="note-row"><div class="note-name">${n.key}</div>`;
                for(let i=0; i<16; i++) rowsHTML += `<div class="cell" data-freq="${n.f}" data-type="${type}" onclick="this.classList.toggle('active')"></div>`;
                rowsHTML += `</div>`;
            });
        }

        box.innerHTML = `<div class="track-title"><span>${type}</span><button class="remove-x" onclick="document.getElementById('${id}').remove()">X</button></div>${rowsHTML}`;
        document.getElementById('workspace-rows').appendChild(box);
    }

    async function togglePlayback() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        playing = !playing;
        if (playing) { step = 0; loop(); }
        else { clearTimeout(interval); }
    }

    function loop() {
        const tracks = document.querySelectorAll('.track-box');
        tracks.forEach(t => {
            const rows = t.querySelectorAll('.note-row');
            rows.forEach(row => {
                const cells = row.querySelectorAll('.cell');
                cells.forEach(c => c.classList.remove('playing'));
                const cell = cells[step];
                cell.classList.add('playing');
                if (cell.classList.contains('active')) {
                    if (cell.dataset.freq) trigger(parseFloat(cell.dataset.freq), cell.dataset.type);
                    else triggerDrum(cell.dataset.sound);
                }
            });
        });
        step = (step + 1) % 16;
        interval = setTimeout(loop, document.getElementById('tempo').value);
    }

    function trigger(f, mode) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        const now = audioCtx.currentTime;

        // Waveform Selection
        if(mode === 'piano') o.type = 'triangle';
        else if(mode === 'guitar') o.type = 'sawtooth';
        else if(mode === 'synth') o.type = 'square';
        else if(mode === 'pluck') o.type = 'sine';
        else if(mode === 'violin') o.type = 'sawtooth';
        
        o.frequency.value = f;

        // Envelope Handling (ADSR logic)
        if (mode === 'violin') {
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(0.1, now + 0.1); 
            g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
            o.start(); o.stop(now + 1.3);
        } else if (mode === 'pluck') {
            g.gain.setValueAtTime(0.2, now);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            o.start(); o.stop(now + 0.4);
        } else {
            g.gain.setValueAtTime(0.08, now);
            let decay = (mode === 'synth' ? 0.8 : 0.4);
            g.gain.exponentialRampToValueAtTime(0.001, now + decay);
            o.start(); o.stop(now + decay + 0.1);
        }

        o.connect(g).connect(audioCtx.destination);
    }

    function triggerDrum(s) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        const now = audioCtx.currentTime;

        if(s === 'kick') { 
            o.frequency.setValueAtTime(150, now);
            o.frequency.exponentialRampToValueAtTime(0.01, now + 0.1);
        } else if(s === 'snare') { 
            o.type = 'triangle'; 
            o.frequency.setValueAtTime(200, now); 
        } else { 
            o.type = 'square';
            o.frequency.setValueAtTime(8000, now); 
        }

        g.gain.setValueAtTime(0.1, now);
        g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        o.connect(g).connect(audioCtx.destination);
        o.start(); o.stop(now + 0.1);
    }
</script>
</body>
</html>
