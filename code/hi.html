<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #000;
        }

        .split-screen {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .option {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #000;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;
        }

        /* The "Pop" - High contrast split */
        .advanced { background: #000; color: #fff; }
        .beginner { background: #fff; color: #000; }

        .option h2 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -4px;
            text-transform: uppercase;
            z-index: 2;
        }

        .option p {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.6;
            z-index: 2;
        }

        /* Animated background text that "pops" on hover */
        .bg-text {
            position: absolute;
            font-size: 20vw;
            font-weight: 900;
            opacity: 0.05;
            pointer-events: none;
            transition: transform 0.8s ease;
        }

        .option:hover { flex: 1.5; } /* Grows the side you hover on */
        
        .advanced:hover { background: #6200ee; } /* Subtle color shift */
        .beginner:hover { background: #03dac6; }

        .option:hover .bg-text {
            transform: scale(1.2) rotate(-5deg);
            opacity: 0.1;
        }
    </style>
</head>
<body>

    <div class="split-screen">
        <a href="codeAdvanced.html" class="option advanced">
            <span class="bg-text">PRO</span>
            <h2>ADVANCED</h2>
            <p>Master the machine</p>
        </a>

        <a href="codeBeginer.html" class="option beginner">
            <span class="bg-text">NEW</span>
            <h2>BEGINNER</h2>
            <p>Start the journey</p>
        </a>
    </div>

</body>
</html>
