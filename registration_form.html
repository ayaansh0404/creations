<!DOCTYPE html>
<html>
<head>
  <title>Neon Party Registration</title>

  <!-- Animate.css -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background: linear-gradient(270deg, #000000, #0f0f2e, #000000);
      background-size: 600% 600%;
      animation: bgMove 10s ease infinite;
      color: white;
    }

    @keyframes bgMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      margin-top: 120px;
      width: 400px;
      margin-left: auto;
      margin-right: auto;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    /* 🌈 Neon Glow */
    .neon {
      color: #fff;
      text-shadow:
        0 0 5px #00ffff,
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff,
        0 0 80px #00ffff;
    }

    .neon-pink {
      color: #fff;
      text-shadow:
        0 0 5px #ff00ff,
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff00ff;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      font-size: 1em;
    }

    input[type="text"] {
      width: 80%;
    }

    /* 👉 Radio buttons in one line */
    .radio-group {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    /* 🔥 Neon Button */
    button {
      width: 80%;
      background: transparent;
      color: #00ffcc;
      border: 2px solid #00ffcc;
      box-shadow:
        0 0 5px #00ffcc,
        0 0 10px #00ffcc,
        0 0 20px #00ffcc;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00ffcc;
      color: black;
      box-shadow:
        0 0 10px #00ffcc,
        0 0 30px #00ffcc,
        0 0 60px #00ffcc;
      transform: scale(1.1);
    }

    #msg {
      margin-top: 15px;
      font-size: 1.2em;
    }
  </style>
</head>

<body>

<div class="box animate__animated animate__fadeInDown">

  <h2 class="neon animate__animated animate__pulse animate__infinite">
    🎉 Party Registration
  </h2>

  <form id="myForm">
    <input type="text" name="name" placeholder="Enter your name" required>

    <br>

    <label class="neon-pink">Will you come?</label>

    <!-- ✅ Inline radio buttons -->
    <div class="radio-group">
      <label>
        <input type="radio" name="response" value="Yes" required> Yes
      </label>

      <label>
        <input type="radio" name="response" value="No"> No
      </label>
    </div>

    <button type="submit">Submit 🎉</button>
  </form>

  <p id="msg"></p>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwvlzWkiAYuUVi14YvUgB1y4Jm5-YKSnKeqFjt16tgYn-Xf100-BcTFX-N3GIc3JZ28kA/exec";

document.getElementById("myForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const form = this;
  const msg = document.getElementById("msg");
  const formData = new FormData(form);

  fetch(scriptURL, {
    method: "POST",
    body: formData
  })
  .then(() => {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });

    msg.className = "neon animate__animated animate__bounceIn";
    msg.innerText = "🎉 You're registered!";

    form.reset();
  })
  .catch(() => {
    msg.innerText = "❌ Error submitting form";
    msg.style.color = "red";
  });
});
</script>

</body>
</html>
