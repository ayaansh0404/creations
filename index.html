<!DOCTYPE html>

 <style>/* ❄️ Elsa Ice Theme Background */
/* ❄️ Elsa Ice Theme Background */
.bb {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;

  overflow: hidden;
  position: relative;

  /* smooth animated gradient */
  background: linear-gradient(
    -45deg,
    #e5c0ff,
    white,
    #8ecffa,
    white,
    #caa7ff,
    #7dbdff
  );

  background-size: 400% 400%;
  animation: colorChange 8s ease infinite;
}

/* ❄️ smooth movement instead of snapping */
@keyframes colorChange {
  0% {
    background-position: 0% 50%;
  }

  50% {
    background-position: 100% 50%;
  }

  100% {
    background-position: 0% 50%;
  }
}

/* ❄️ Snow layer (SAFE, does NOT block clicks) */
.bb::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;

  background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px);
  background-size: 45px 45px;
  opacity: 0.18;

  animation: drift 25s linear infinite;
}

/* snow movement */
@keyframes drift {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(-200px);
  }
}

/* ❄️ Main text */
.w {
  font-size: 52px;
  font-weight: 700;
  text-align: center;
  color: #1a3b4d;
  text-shadow:
    0 2px 10px rgba(180, 230, 255, 0.6),
    0 0 20px rgba(200, 240, 255, 0.4);

  margin-bottom: 25px;
  letter-spacing: 1px;

  position: relative;
  z-index: 2;
}

/* ❄️ Glass icy button */
button {
  padding: 14px 32px;
  font-size: 18px;

  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 999px;

  background: rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(10px);

  color: #0f2f3f;
  cursor: pointer;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.08),
    inset 0 0 10px rgba(255,255,255,0.6);

  transition: all 0.2s ease;

  position: relative;
  z-index: 2;
}

button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow:
    0 15px 40px rgba(120, 200, 255, 0.25),
    inset 0 0 14px rgba(255,255,255,0.8);
}

button:active {
  transform: scale(0.98);
}

@media (max-width: 600px) {
  .w {
    font-size: 36px;
    padding: 0 15px;
  }

  button {
    font-size: 16px;
    padding: 10px 22px;
  }
}
</style>
