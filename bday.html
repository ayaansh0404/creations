<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<style>
body {
  padding: 20px;
  color: white;
  background: linear-gradient(270deg, #000000, #0f0f2e, #000000);
  background-size: 600% 600%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}





/* Text spacing using responsive units */
#h3 {
  margin-left: 2vw;
}

#invited {
   margin-top: 20px;
  margin-bottom: 20px;
 font-size: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#time {
  margin-left: 700px;
  display: flex;
}
#two {
  margin-left: 80vw;
}

/* Responsive big text */
.three {
  margin-top: 20px;
  margin-bottom: 20px;
 font-size: 500px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Optional: keep headings left aligned */
h3, h1, h2 {
  text-align: left;
  text-shadow: 
  0px 0px 20px #2323FF,
  0px 0px 40px #2323FF,
  0px 0px 60px #2323FF,
  0px 0px 80px #2323FF;
}
hr {
  border: none;
  height: 3px;
  background-color: white;
  margin: 20px 0;
}

</style>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<title>ayaansh's Birthday</title>
</head>

<body class = "text-white bg-dark"><br><br><br><br><br><br>

<h3 id="h3">dun</h3>
<h2 id="invited" class="text-center"></h2>

<h3 id="two"></h3>
<span><h1 id="three" class="text-center three"></h1><div style="text-align:center; margin-top:200px;">
  <button onclick="startParty()" class="btn btn-success btn-lg">
    🎉 Start
  </button>
</div>
<h2 id="countdown"></h2></span>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
  
function startParty() {

  let sound = new Audio("https://www.myinstants.com/media/sounds/dun-dun-dun.mp3");
  sound.play();

  document.querySelector("button").style.display = "none";

  setTimeout(function () {
    document.getElementById('h3').style.display = "none";
    document.getElementById('two').innerHTML = "dun";
  }, 600);

  setTimeout(function () {
    document.getElementById('two').style.display = "none";

    let three = document.getElementById('three');
    three.style.display = "block";
    three.innerHTML = "DUN";
    three.classList.add('animate__animated', 'animate__tada');

  }, 1000);

  setTimeout(function () {
    document.getElementById('three').style.display = "none";

    let ayaansh = document.getElementById('invited');
    ayaansh.classList.add('animate__animated', 'animate__lightSpeedInRight');

    ayaansh.innerHTML = "It's Ayaansh's Birthday!!!🎉🎂";

    if (typeof confetti === "function") {
      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      });
    }

  }, 4000);

  setTimeout(function () {
    let ayaansh = document.getElementById('invited');
    ayaansh.innerHTML = "and YOU are invited!!!!";
  }, 6000);

  setTimeout(function () {
    let ayaansh = document.getElementById('invited');

    ayaansh.classList.add('animate__animated', 'animate__fadeOut');

    ayaansh.innerHTML = `
      It's a neon party, so dress up in your <br>
      brightest clothes and get ready to dance the night away!🪩
      <hr>
    `;

    let three = document.getElementById('three');
    three.style.display = "block";
    three.innerHTML = `Date-April 5<br>Time-4:45<br>Place-Farmington hills court aldie VA<br><a href="https://ayaansh0404.github.io/creations/registration_form.html"><button class = "btn btn-success">RSVP</button></a>`;
    three.style.fontSize = "20px";

  }, 9000);

}
</script>

</body>
</html>
