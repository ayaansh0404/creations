<!DOCTYPE html>
<html lang="en">
<head>
<style>
body {
  padding: 20px;
  background-color: #212529; /* same as Bootstrap bg-dark */
  color: white;
}

/* Text spacing using responsive units */
#h3 {
  margin-left: 2vw;
}

#invited {
  margin-left: 4vw;
}

#two {
  margin-left: 80vw;
}

/* Responsive big text */
.three {

  margin-top: 20px;
  margin-bottom: 20px;
 font-size: 500px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Optional: keep headings left aligned */
h3, h1 {
  text-align: left;
}
</style>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<title>ayaansh's Birthday</title>
</head>

<body class = "text-white bg-dark"><br><br><br><br><br><br>

<h3 id="h3">dun</h3>
<h3 id="invited"></h3>
<h3 id="two"></h3>
<h1 id="three" class="text-center three"></h1>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
// after 2s → show second
setTimeout(function () {
  document.getElementById('h3').style.display = "none";
  document.getElementById('two').innerHTML = "dun";
}, 1000);

// after 4s → show third
setTimeout(function () {
  document.getElementById('two').style.display = "none";
  document.getElementById('three').innerHTML = "DUN";
}, 2000);

// optional: hide third later
setTimeout(function () {
  document.getElementById('three').style.display = "none";
  document.getElementById('invited').innerHTML = "You have been invited to ayaansh's birthday party!";

  confetti({
    particleCount: 100,
    spread: 70,
    origin: { x: 0.5, y: 0.5 }, // center of screen
    colors: ['#ff5252', '#ffeb3b', '#4caf50', '#03a9f4', '#ff9800'],
  });

}, 4000);
setTimeout(function () {
  document.getElementById('invited').innerHTML = "Get ready to celebrate with cake, games, and lots of fun! Can't wait to see you there!"

}, 4000);
</script>

</body>
</html>
